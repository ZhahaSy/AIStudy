server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 前端路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反代后端 API
    location /api/ {
        proxy_pass http://ai-study-backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 反代上传文件静态资源
    location /uploads/ {
        proxy_pass http://ai-study-backend:3000/uploads/;
    }
}
