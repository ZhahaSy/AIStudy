name: ai-study

# ECS 上 deploy/.env 示例：
#   IMAGE_BASE=...
#   IMAGE_TAG=...
#   FRONTEND_HOST_PORT=8080

services:
  backend:
    image: ${IMAGE_BASE}/ai-study-backend:${IMAGE_TAG:-latest}
    container_name: ai-study-backend
    restart: unless-stopped
    env_file:
      - ./backend.env
    volumes:
      - /opt/ai-study/data/uploads:/app/uploads
      - /opt/ai-study/data/db:/app
    networks:
      - app-net

  frontend:
    image: ${IMAGE_BASE}/ai-study-frontend:${IMAGE_TAG:-latest}
    container_name: ai-study-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
